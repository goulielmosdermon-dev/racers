  .top h1, .hero h2, .mcard .k{
    font-family:"PP Kyoto","Barlow Semi Condensed",sans-serif;
    font-weight:800;letter-spacing:.005em;
  }
  :root{
    --masthead:#b8430e; --primary:#e2620f; --green:#1f7a44; --london:#6d28d9;
    --amber:#e0950b; --good:#1f7a44; --ink:#16181d; --paper:#eef0f4; --card:#fff;
    --rule:#dcdfe6; --muted:#5c6470; --r:5px;
    /* exact PDF strip colours */
    --s-maroon:#b62719; --s-blue:#1038c0; --s-purple:#200860; --s-gbreak:#2a6010;
    --s-gnight:#3a4b19; --s-black:#101010; --s-yellow:#f8f0b8; --s-slate:#2e2e44; --s-tan:#d9c08c;
    --shadow:0 1px 0 rgba(184,67,14,.05), 0 6px 20px -12px rgba(184,67,14,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:0 14px 72px}
  .view{display:none} .view.active{display:block}

  /* top bar */
  .top{position:sticky;top:0;z-index:40;background:var(--masthead);color:#fff;display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:0 0 var(--r) var(--r);box-shadow:var(--shadow)}
  .top .home{cursor:pointer;margin-left:auto;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;border-radius:var(--r);font-family:"Barlow Semi Condensed";font-weight:600;font-size:13px;letter-spacing:.04em;padding:6px 12px}
  .top .home:hover{background:rgba(255,255,255,.12)}
  .top h1{font-family:"Barlow Semi Condensed",sans-serif;font-weight:700;font-size:20px;margin:0;letter-spacing:.04em}
  .top .crumb{font-size:12.5px;color:#f3d6c6}

  /* MENU */
  .hero{padding:34px 6px 8px}
  .hero .eyebrow{font-family:"Barlow Semi Condensed";text-transform:uppercase;letter-spacing:.22em;font-size:12px;font-weight:600;color:var(--masthead);margin:0 0 4px}
  .hero h2{font-family:"Barlow Semi Condensed";font-weight:700;font-size:clamp(34px,8vw,60px);line-height:.95;margin:0;letter-spacing:.01em}
  .hero p{color:var(--muted);margin:10px 0 0;font-size:14.5px}
  .menucards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:26px}
  @media(max-width:640px){.menucards{grid-template-columns:1fr}}
  .mcard{cursor:pointer;border:1px solid var(--rule);border-radius:var(--r);background:var(--card);padding:24px;box-shadow:var(--shadow);transition:transform .14s ease,border-color .14s ease;text-align:left}
  .mcard:hover{transform:translateY(-2px);border-color:var(--primary)}
  .mcard .k{font-family:"Barlow Semi Condensed";font-weight:700;font-size:26px;letter-spacing:.01em}
  .mcard .d{color:var(--muted);font-size:13.5px;margin-top:4px}
  .mcard .arrow{margin-top:18px;display:inline-flex;align-items:center;gap:7px;color:var(--primary);font-weight:600;font-size:13.5px}
  .mcard .bar{height:6px;border-radius:var(--r);margin-bottom:16px}

  /* tabs (shared) */
  .tabs{display:flex;gap:8px;padding:14px 0 12px;overflow-x:auto}
  .tab{flex:0 0 auto;border:1px solid var(--rule);background:var(--card);color:var(--muted);border-radius:var(--r);padding:9px 15px;cursor:pointer;font-family:"Barlow Semi Condensed";font-weight:600;font-size:15px;letter-spacing:.03em;white-space:nowrap}
  .tab[aria-selected="true"]{background:var(--masthead);color:#fff;border-color:var(--masthead)}
  .tabs.sticky{position:sticky;top:54px;z-index:30;background:var(--paper)}
  .cartabs .tab[aria-selected="true"]{background:var(--primary);border-color:var(--primary)}

  /* ===== TRAVEL ORDER ===== */
  .daynote{font-size:14px;color:var(--muted);margin:2px 0 12px}
  .daynote.flag{color:#8a2f0c;background:#fdeee6;border:1px solid #f3c9b3;border-radius:var(--r);padding:8px 11px}
  .car{background:var(--card);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);max-width:560px}
  .carhead{padding:13px 15px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .carname{font-family:"Barlow Semi Condensed";font-weight:700;font-size:19px;letter-spacing:.02em}
  .carmeta{font-size:12px;color:var(--muted);text-align:right;line-height:1.4}
  .carmeta b{color:var(--ink)} .tellink{color:var(--primary);font-weight:600;text-decoration:none;font-family:"IBM Plex Mono",monospace}
  .legs{list-style:none;margin:0;padding:6px 0 4px}
  .leg{position:relative;padding:12px 15px;transition:opacity .2s ease}
  .leg+.leg{border-top:1px dashed var(--rule)}
  .leg.arrived{opacity:.5}
  .leg.arrived .stopname::after{content:" · ENDED";color:var(--good);font-family:"Barlow Semi Condensed";font-size:12px;letter-spacing:.06em}
  .legtop{display:flex;align-items:flex-start;gap:11px}
  .marker{flex:0 0 auto;width:30px;display:flex;flex-direction:column;align-items:center;padding-top:2px}
  .dot{width:13px;height:13px;border-radius:50%;border:3px solid var(--primary);background:#fff}
  .dot.local{border-color:var(--green)} .dot.london{border-color:var(--london)}
  .dot.base{border-color:var(--masthead);background:var(--masthead)}
  .num{font-family:"IBM Plex Mono";font-size:10px;color:var(--muted);margin-top:4px}
  .stop{flex:1 1 auto;min-width:0}
  .stopname{font-weight:600;font-size:15.5px;line-height:1.2}
  .tag{display:inline-block;font-family:"Barlow Semi Condensed";font-weight:600;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#fff;padding:1px 7px;border-radius:var(--r);margin-left:7px;vertical-align:middle}
  .tag.haul{background:var(--primary)}.tag.local{background:var(--green)}.tag.london{background:var(--london)}.tag.base{background:var(--masthead)}.tag.tbc{background:var(--amber)}
  .addr{font-size:13px;color:var(--muted);margin-top:2px}
  .codes{margin-top:5px;display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center}
  .pc{font-family:"IBM Plex Mono";font-weight:600;font-size:12.5px;background:#f4ede6;border:1px solid #e6d8cb;border-radius:var(--r);padding:1px 7px}
  .w3w{font-family:"IBM Plex Mono";font-size:12px;color:var(--green);text-decoration:none;border-bottom:1px dotted var(--green)}
  .w3w::before{content:"///";opacity:.55}
  .legactions{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  .leaveby{font-family:"Barlow Semi Condensed";font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--amber)}
  .endlabel{font-family:"Barlow Semi Condensed";font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  input.timeslot{font-family:"IBM Plex Mono";font-weight:600;font-size:13px;color:var(--ink);background:#fff7ec;border:1px solid var(--amber);border-radius:var(--r);padding:3px 8px}
  .nav{margin-left:auto;display:inline-flex;align-items:center;gap:5px;text-decoration:none;background:var(--primary);color:#fff;font-weight:600;font-size:12.5px;border-radius:var(--r);padding:6px 11px}
  .nav svg{width:13px;height:13px;fill:#fff}
  .arrivebtn{display:block;width:100%;margin-top:9px;border:1px solid var(--rule);background:#fff;color:var(--good);font-family:"Barlow Semi Condensed";font-weight:600;font-size:13px;letter-spacing:.05em;border-radius:var(--r);padding:8px;cursor:pointer}
  .leg.arrived .arrivebtn{background:var(--good);color:#fff;border-color:var(--good)}
  .driveto{font-size:11.5px;color:var(--muted);margin:9px 0 0 41px;display:flex;align-items:center;gap:6px}
  .driveto .chev{color:var(--primary);font-weight:700}.driveto.long{color:#8a2f0c;font-weight:600}
  .carfoot{padding:11px 15px;border-top:1px solid var(--rule);background:#fcf7f3}
  .routebtn{display:flex;justify-content:center;align-items:center;gap:7px;text-decoration:none;background:var(--masthead);color:#fff;font-weight:600;font-size:13.5px;border-radius:var(--r);padding:9px}
  .routebtn svg{width:15px;height:15px;fill:#fff}

  /* ===== SCHEDULE ===== */
  .schtools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:4px 0 12px}
  .btn{font-family:"Barlow Semi Condensed";font-weight:600;font-size:13.5px;letter-spacing:.04em;border:1px solid var(--rule);background:#fff;color:var(--ink);border-radius:var(--r);padding:8px 13px;cursor:pointer}
  .btn:hover{border-color:var(--masthead)} .btn:disabled{opacity:.4;cursor:default}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .wrapinfo{margin-left:auto;font-size:13px;color:var(--muted)} .wrapinfo b{font-family:"IBM Plex Mono";color:var(--ink)}
  .savetag{font-size:11.5px;color:var(--good);font-weight:600}

  .colhdr{display:flex;gap:6px;background:var(--s-slate);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:7px 10px 7px 86px;font-family:"Barlow Semi Condensed";font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .colhdr span{flex:1}.colhdr .c-desc{flex:3}
  @media(max-width:760px){.colhdr{display:none}}

  .strips{display:flex;flex-direction:column;gap:6px;margin-top:6px}
  .strip{display:flex;align-items:stretch;border-radius:var(--r);overflow:hidden;border:1px solid rgba(0,0,0,.12);min-height:46px;background:#fff;position:relative}
  .strip.dragging{opacity:.85;box-shadow:0 10px 28px -8px rgba(0,0,0,.5);transform:scale(1.01)}
  .handle{flex:0 0 auto;width:30px;display:flex;align-items:center;justify-content:center;cursor:grab;color:rgba(255,255,255,.85);background:rgba(0,0,0,.14);touch-action:none;font-size:18px;user-select:none}
  .strip.light .handle{color:rgba(0,0,0,.4);background:rgba(0,0,0,.05)}
  .stimes{flex:0 0 auto;display:flex;align-items:center;gap:3px;padding:0 8px}
  .tin{background:transparent;border:0;color:inherit;font-family:"IBM Plex Mono";font-weight:600;font-size:16px;width:44px;text-align:center;padding:3px 0;outline:none;border-radius:4px;-webkit-appearance:none}
  .tin:focus{background:rgba(255,255,255,.20)}
  .strip.light .tin:focus{background:rgba(0,0,0,.08)}
  .tdash{opacity:.65;font-weight:600}
  .sbody{flex:1 1 auto;display:flex;align-items:center;padding:7px 10px;min-width:0}
  .slabel{flex:1;font-weight:600;font-size:13.5px;line-height:1.25;outline:none;word-break:break-word}
  .sdel{flex:0 0 auto;align-self:stretch;width:30px;border:0;background:rgba(0,0,0,.12);color:inherit;cursor:pointer;font-size:15px;opacity:.7}
  .sdel:hover{opacity:1;background:rgba(0,0,0,.22)}
  /* strip colours */
  .strip.maroon{background:var(--s-maroon);color:#fff}
  .strip.blue{background:var(--s-blue);color:#fff}

const $=id=>document.getElementById(id);
function toMin(h){const [a,b]=h.split(":").map(Number);return a*60+b;}
function toHHMM(m){m=((Math.round(m)%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
function fmt4(m){m=((Math.round(m)%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,"0")+String(m%60).padStart(2,"0");}
function parseTime(tok){if(tok==null)return null;tok=String(tok).replace(":","").trim();if(!/^\d{3,4}$/.test(tok))return null;if(tok.length===3)tok="0"+tok;const h=+tok.slice(0,2),m=+tok.slice(2);if(h>23||m>59)return null;return h*60+m;}
function splitLeadingTime(label){const m=label.match(/^\s*(\d{3,4})(?:\s*[–-]\s*(\d{3,4}))?(?=\s|$)\s*([\s\S]*)$/);if(!m)return null;const a=parseTime(m[1]);if(a===null)return null;const b=m[2]?parseTime(m[2]):null;if(m[2]&&b===null)return null;return{start:a,end:b,rest:m[3].trim()};}
const LIGHT=new Set(["scene","yellow","note"]);

/* ============================ SCHEDULE ============================ */
const KEY="racers_sched_v2";
let SCHED, CUR=0, HIST=[], HP=-1, store=null;
try{const t="__t";localStorage.setItem(t,"1");localStorage.removeItem(t);store=localStorage;}catch(e){store=null;}

function buildModel(src){ /* convert authored .t into per-strip duration + day anchor */
  return src.map(day=>{
    const strips=day.strips.map(s=>Object.assign({},s));
    const anchor=toMin(strips[0].t);
    strips.forEach((s,i)=>{ s.dur = (i<strips.length-1)? Math.max(0,toMin(strips[i+1].t)-toMin(s.t)) : 0; });
    strips.forEach(s=>{
      if(s.kind!=="scene"){
        const p=splitLeadingTime(s.label||"");
        if(p){ s.timed=true; s.range=(p.end!=null); if(s.range)s.len=p.end-p.start; s.label=p.rest; }
        else s.timed=false;
      } else s.timed=false;
      delete s.t;
    });
    return {n:day.n,title:day.title,anchor,strips};
  });
}
function load(){
  if(store){const raw=store.getItem(KEY); if(raw){try{SCHED=JSON.parse(raw);}catch(e){SCHED=buildModel(SCHED_DEFAULT);}}else SCHED=buildModel(SCHED_DEFAULT);}
  else SCHED=buildModel(SCHED_DEFAULT);
  HIST=[JSON.stringify(SCHED)];HP=0;
}
function save(snap){ if(store){store.setItem(KEY,JSON.stringify(SCHED));} pushRemote("sched",SCHED); flashSaved(); }
let saveT;function flashSaved(){const t=$("saveTag");if(!t)return;t.textContent="saved";t.style.opacity="1";clearTimeout(saveT);saveT=setTimeout(()=>t.style.opacity=".5",900);}
function snapshot(){ HIST=HIST.slice(0,HP+1); HIST.push(JSON.stringify(SCHED)); if(HIST.length>80)HIST.shift(); HP=HIST.length-1; save(); updHistBtns(); }
function undo(){ if(HP>0){HP--;SCHED=JSON.parse(HIST[HP]);save();renderSched();} }
function redo(){ if(HP<HIST.length-1){HP++;SCHED=JSON.parse(HIST[HP]);save();renderSched();} }
function updHistBtns(){ $("undoBtn").disabled=HP<=0; $("redoBtn").disabled=HP>=HIST.length-1; }

function starts(day){let s=day.anchor;const a=[];for(const st of day.strips){a.push(s);s+=st.dur||0;}return a;}
function setTimeMin(di,si,T){ const day=SCHED[di];const cur=starts(day)[si];const delta=T-cur;
  if(si===0){day.anchor+=delta;} else {day.strips[si-1].dur=Math.max(0,(day.strips[si-1].dur||0)+delta);} snapshot();renderSched(); }
function setEndMin(di,si,T){ const start=starts(SCHED[di])[si]; SCHED[di].strips[si].len=Math.max(0,T-start); snapshot();renderSched(); }
function addStrip(){ const day=SCHED[CUR]; day.strips.push({kind:"maroon",dur:0,label:"NEW STRIP — edit me"}); snapshot();renderSched();
  const list=$("stripList");list.lastElementChild.scrollIntoView({block:"center"}); }
function delStrip(si){ SCHED[CUR].strips.splice(si,1); snapshot();renderSched(); }
function resetDay(){ const d=buildModel(SCHED_DEFAULT)[CUR]; SCHED[CUR]=d; snapshot();renderSched(); }
function printSched(){ const v=$("view-schedule"); v.classList.add("printme"); window.print(); setTimeout(()=>v.classList.remove("printme"),400); }

function field(val,fieldName,si,extra){ return '<span class="val'+(extra||"")+'" contenteditable="true" data-f="'+fieldName+'" data-i="'+si+'">'+(val||"")+'</span>'; }
function timeCell(si,startMin,st){
  if(!st.timed) return '';
  const s='<input class="tin" inputmode="numeric" maxlength="5" value="'+fmt4(startMin)+'" data-ts="'+si+'">';
  if(st.range){
    const e='<input class="tin" inputmode="numeric" maxlength="5" value="'+fmt4(startMin+(st.len||0))+'" data-te="'+si+'">';
    return '<div class="stimes">'+s+'<span class="tdash">–</span>'+e+'</div>';
  }
  return '<div class="stimes">'+s+'</div>';
}
function renderStrip(st,si,startMin){
  const light=LIGHT.has(st.kind);
  const tcell=timeCell(si,startMin,st);
  let body;
  if(st.kind==="scene"){
    body='<div class="sbody"><div class="scl1">'
      +'<span class="scnum" contenteditable="true" data-f="sc" data-i="'+si+'">'+(st.sc||"")+'</span>'
      +'<select data-f="ie" data-i="'+si+'"><option'+(st.ie==="INT"?" selected":"")+'>INT</option><option'+(st.ie==="EXT"?" selected":"")+'>EXT</option></select>'
      +'<select data-f="dn" data-i="'+si+'"><option'+(st.dn==="DAY"?" selected":"")+'>DAY</option><option'+(st.dn==="NIGHT"?" selected":"")+'>NIGHT</option></select>'
      +'<span class="scdesc" contenteditable="true" data-f="desc" data-i="'+si+'">'+(st.desc||"")+'</span></div>'
      +'<div class="scl2">'
      +'<span class="scfield"><span class="lab">Loc</span>'+field(st.loc,"loc",si)+'</span>'
      +'<span class="scfield"><span class="lab">Cast</span>'+field(st.cast,"cast",si)+'</span>'
      +'<span class="scfield"><span class="lab">Pgs</span>'+field(st.pgs,"pgs",si)+'</span>'
      +'<span class="scfield"><span class="lab">Notes</span>'+field(st.notes,"notes",si," notes")+'</span></div></div>';
  } else {
    body='<div class="sbody"><span class="slabel" contenteditable="true" data-f="label" data-i="'+si+'">'+(st.label||"")+'</span></div>';
  }
  return '<div class="strip '+st.kind+(light?" light":"")+'" data-id="'+st.id+'">'
    +'<div class="handle" data-h="'+si+'">⠿</div>'+tcell+body
    +'<button class="sdel" title="Delete strip" data-d="'+si+'">×</button></div>';
}
function renderSched(){
  const dt=$("sDayTabs");dt.innerHTML="";
  SCHED.forEach((d,i)=>{const b=document.createElement("button");b.className="tab";b.setAttribute("aria-selected",i===CUR);b.textContent="Day "+d.n;b.onclick=()=>{CUR=i;renderSched();};dt.appendChild(b);});
  const day=SCHED[CUR]; day.strips.forEach((s,i)=>{if(!s.id)s.id="s"+i+"_"+Math.random().toString(36).slice(2,7);});
  const st=starts(day);
  $("stripList").innerHTML=day.strips.map((s,i)=>renderStrip(s,i,st[i])).join("");
  $("wrapTime").textContent= day.strips.length? toHHMM(st[st.length-1]) : "—";
  updHistBtns(); wireStrips();
}
function wireStrips(){
  const list=$("stripList");
  list.querySelectorAll('.tin[data-ts]').forEach(inp=>inp.addEventListener("change",e=>{const m=parseTime(e.target.value);if(m==null){renderSched();return;}setTimeMin(CUR,+e.target.dataset.ts,m);}));
  list.querySelectorAll('.tin[data-te]').forEach(inp=>inp.addEventListener("change",e=>{const m=parseTime(e.target.value);if(m==null){renderSched();return;}setEndMin(CUR,+e.target.dataset.te,m);}));
  list.querySelectorAll('.sdel').forEach(b=>b.onclick=()=>delStrip(+b.dataset.d));
  list.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener("blur",()=>{const si=+el.dataset.i,f=el.dataset.f;const v=el.textContent;if(SCHED[CUR].strips[si][f]!==v){SCHED[CUR].strips[si][f]=v;snapshot();}});
    el.addEventListener("keydown",e=>{if(e.key==="Enter"&&f0(el)){e.preventDefault();el.blur();}});
  });
  list.querySelectorAll('select').forEach(sel=>sel.addEventListener("change",()=>{const si=+sel.dataset.i;SCHED[CUR].strips[si][sel.dataset.f]=sel.value;snapshot();}));
  list.querySelectorAll('.handle').forEach(h=>h.addEventListener("pointerdown",startDrag));
}
function f0(el){return el.classList.contains("slabel")||el.classList.contains("scnum");}

/* drag reorder */
let drag=null;
function startDrag(e){
  e.preventDefault();
  const stripEl=e.target.closest(".strip"),list=$("stripList");
  drag={el:stripEl,list};stripEl.classList.add("dragging");
  document.addEventListener("pointermove",onDrag);
  document.addEventListener("pointerup",endDrag,{once:true});
}
function onDrag(e){
  if(!drag)return;
  const others=[...drag.list.querySelectorAll(".strip:not(.dragging)")];
  const after=others.find(el=>{const r=el.getBoundingClientRect();return e.clientY<r.top+r.height/2;});
  if(after)drag.list.insertBefore(drag.el,after); else drag.list.appendChild(drag.el);
}
function endDrag(){
  document.removeEventListener("pointermove",onDrag);
  if(!drag)return; drag.el.classList.remove("dragging");
  const ids=[...drag.list.querySelectorAll(".strip")].map(el=>el.dataset.id);
  SCHED[CUR].strips.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
  drag=null; snapshot(); renderSched();
}

/* keyboard undo/redo */
document.addEventListener("keydown",e=>{
  if($("view-schedule").classList.contains("active")&&(e.metaKey||e.ctrlKey)){
    const k=e.key.toLowerCase();
    if(k==="z"&&!e.shiftKey){e.preventDefault();undo();}
    else if((k==="z"&&e.shiftKey)||k==="y"){e.preventDefault();redo();}
  }
});

    };
  });
}
let CALL, CCUR=0;
function loadCall(){ if(store){const raw=store.getItem(CKEY);if(raw){try{CALL=JSON.parse(raw);}catch(e){CALL=buildCall();}}else CALL=buildCall();} else CALL=buildCall(); }
let csT;function saveCall(){ if(store)store.setItem(CKEY,JSON.stringify(CALL)); pushRemote("call",CALL); const t=$("cSaveTag");if(t){t.style.opacity="1";clearTimeout(csT);csT=setTimeout(()=>t.style.opacity=".5",900);} }
function resetCall(){ CALL[CCUR]=buildCall()[CCUR]; saveCall(); renderCall(); }
function printCall(){ const v=$("view-callsheet");v.classList.add("printme");window.print();setTimeout(()=>v.classList.remove("printme"),400); }

/* weather (Open-Meteo, client-side, no key) */
const wxCache={};
const WMO={0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],45:["Fog","🌫️"],48:["Rime fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Heavy drizzle","🌧️"],56:["Freezing drizzle","🌧️"],57:["Freezing drizzle","🌧️"],61:["Light rain","🌦️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],66:["Freezing rain","🌧️"],67:["Freezing rain","🌧️"],71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],77:["Snow grains","🌨️"],80:["Showers","🌦️"],81:["Showers","🌧️"],82:["Violent showers","⛈️"],85:["Snow showers","🌨️"],86:["Snow showers","🌨️"],95:["Thunderstorm","⛈️"],96:["Thunderstorm","⛈️"],99:["Thunderstorm","⛈️"]};
function wxDesc(c){return WMO[c]||["—","🌡️"];}
function fetchWx(di){
  const dm=DMETA[di],key=ISO[di]+"@"+dm.lat+","+dm.lon;
  if(wxCache[key])return Promise.resolve(wxCache[key]);
  const url="https://api.open-meteo.com/v1/forecast?latitude="+dm.lat+"&longitude="+dm.lon+"&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,sunrise,sunset&timezone=Europe%2FLondon&start_date="+ISO[di]+"&end_date="+ISO[di];
  return fetch(url).then(r=>r.json()).then(j=>{const d=j.daily;const o={code:d.weather_code[0],hi:d.temperature_2m_max[0],lo:d.temperature_2m_min[0],pop:d.precipitation_probability_max[0],wind:d.wind_speed_10m_max[0],sunrise:d.sunrise[0],sunset:d.sunset[0]};wxCache[key]=o;return o;});
}
function wxHtml(w){const[desc,emo]=wxDesc(w.code);const hm=s=>s?s.slice(11,16):"—";
  return '<span class="big">'+emo+'</span>'
   +'<span><span class="t">'+Math.round(w.hi)+'° / '+Math.round(w.lo)+'°C</span><br><span class="sub">'+desc+'</span></span>'
   +'<span><span class="sub">Rain</span><br>'+(w.pop!=null?w.pop+'%':'—')+'</span>'
   +'<span><span class="sub">Wind</span><br>'+Math.round(w.wind)+' km/h</span>'
   +'<span><span class="sub">Sunrise</span><br>'+hm(w.sunrise)+'</span>'
   +'<span><span class="sub">Sunset</span><br>'+hm(w.sunset)+'</span>';}

/* render */
function mapsLink(q){return "https://www.google.com/maps/search/?api=1&query="+enc(q);}
function telA(p){p=(p||"").trim();return p?'<a class="ic" href="tel:'+p.replace(/[^+0-9]/g,"")+'" title="Call">📞</a>':'';}
function mailA(e){e=(e||"").trim();return e?'<a class="ic" href="mailto:'+e+'" title="Email">✉️</a>':'';}
function ced(val,sec,i,f){return '<span class="ced" contenteditable="true" data-sec="'+sec+'" data-i="'+i+'" data-f="'+f+'">'+(val||"")+'</span>';}

function renderCall(){
  const dt=$("cDayTabs");dt.innerHTML="";
  CALL.forEach((c,i)=>{const b=document.createElement("button");b.className="tab";b.setAttribute("aria-selected",i===CCUR);b.textContent="Day "+(i+1);b.onclick=()=>{CCUR=i;renderCall();};dt.appendChild(b);});
  const c=CALL[CCUR], di=CCUR, sd=SCHED[di], st=starts(sd);
  const call=toHHMM(st[0]), wrap=toHHMM(st[st.length-1]);
  const td=TDAYS[di];
  let meal=null;
  for(let i=0;i<sd.strips.length;i++){if(sd.strips[i].kind==="gbreak"){const lab=sd.strips[i].label||"";meal={t:toHHMM(st[i]),nm:/lunch/i.test(lab)?"Lunch":(/dinner/i.test(lab)?"Dinner":"Break")};break;}}

  /* key contacts */
  const kc=["Director","Production Manager","1st AD"].map(role=>{const p=c.crew.find(x=>x.role.toLowerCase()===role.toLowerCase());return (p&&p.phone)?'<a href="tel:'+p.phone.replace(/[^+0-9]/g,"")+'">📞 '+role+': '+p.name+'</a>':"";}).filter(Boolean).join("");

  /* timings */
  let tl='<div class="tline"><span class="tt">'+call+'</span><span>General call</span></div>';
  sd.strips.forEach((s,i)=>{ if(s.kind==="purple"||s.kind==="gbreak"){ tl+='<div class="tline"><span class="tt">'+toHHMM(st[i])+'</span><span>'+s.label+'</span></div>'; }});
  tl+='<div class="tline"><span class="tt">'+wrap+'</span><span>Final wrap</span></div>';

  /* scenes */
  const scenes=sd.strips.filter(s=>s.kind==="scene");
  const scHtml=scenes.length? scenes.map(s=>'<div class="scn"><span class="sb">'+s.sc+'</span><span class="dn '+(s.dn||"DAY")+'">'+(s.ie||"")+' '+(s.dn||"")+'</span><span class="sd">'+s.desc+'<div class="meta2">'+(s.loc||"")+' · cast '+(s.cast||"—")+' · '+(s.pgs||"")+' pp</div></span></div>').join("") : '<span class="muted">No scenes listed.</span>';

  /* people renderers */
  const crewHtml=c.crew.map((p,i)=>'<div class="prow"><span class="pn">'+ced(p.name,"crew",i,"name")+'</span><span class="pr">'+ced(p.role,"crew",i,"role")+'</span>'
    +'<span class="psub"><span>'+ced(p.phone,"crew",i,"phone")+' '+telA(p.phone)+'</span><span>'+ced(p.email,"crew",i,"email")+' '+mailA(p.email)+'</span></span>'
    +'<button class="rowdel" onclick="delRow(\'crew\','+i+')">×</button></div>').join("");
  const castHtml=c.cast.length? c.cast.map((p,i)=>'<div class="prow"><span class="pn">'+ced(p.char,"cast",i,"char")+'</span><span class="pr">'+ced(p.actor,"cast",i,"actor")+'</span>'
    +'<span class="psub"><span class="sub">Call</span> '+ced(p.callT,"cast",i,"callT")+'<span>'+ced(p.phone,"cast",i,"phone")+' '+telA(p.phone)+'</span><span>'+ced(p.email,"cast",i,"email")+' '+mailA(p.email)+'</span></span>'
    +'<button class="rowdel" onclick="delRow(\'cast\','+i+')">×</button></div>').join("") : '<span class="muted">No cast called.</span>';
  const exHtml=c.extras.map((p,i)=>'<div class="prow"><span class="pn">'+ced(p.name,"extras",i,"name")+'</span><span class="pr">'+ced(p.note,"extras",i,"note")+'</span><button class="rowdel" onclick="delRow(\'extras\','+i+')">×</button></div>').join("");
  const stHtml=c.stunts.map((p,i)=>'<div class="prow"><span class="pn">'+ced(p.name,"stunts",i,"name")+'</span><span class="pr">'+ced(p.role,"stunts",i,"role")+'</span><span class="psub"><span>'+ced(p.phone,"stunts",i,"phone")+' '+telA(p.phone)+'</span></span><button class="rowdel" onclick="delRow(\'stunts\','+i+')">×</button></div>').join("");

  const aeQ="A&E hospital near "+(c.callLoc.address||DMETA[di].place);

  $("cBody").innerHTML=
    '<h2 class="cs-title">Call Sheet</h2>'
    +'<div class="csmast"><div class="csgrid">'
      +'<div class="csb csb-l"><div class="cseye">Production</div><div class="cs-prodname">RACERS</div><div class="csb-sub">'+td.title+'</div></div>'
      +'<div class="csb csb-m"><div class="csb-lbl">General call</div><div class="bigcall">'+call+'</div></div>'
      +'<div class="csb csb-r"><div class="csb-date">'+td.date+'</div><div class="csb-dayof">Day '+(di+1)+' of 5</div>'
        +'<div class="csb-mini"><div><span>Wrap</span><b>'+wrap+'</b></div>'+(meal?'<div><span>'+meal.nm+'</span><b>'+meal.t+'</b></div>':'')+'</div></div>'
    +'</div>'
      +(kc?'<div class="keybar">'+kc+'</div>':'')+'</div>'

    +'<div class="csec"><h3>Weather · '+DMETA[di].place+'</h3><div class="wx" id="wxBox"><span class="muted">Loading forecast…</span></div></div>'

    +'<div class="csec"><h3>Crew call location</h3>'
      +'<div class="locname">'+ced(c.callLoc.name,"callLoc",0,"name")+'</div>'
      +'<div>'+ced(c.callLoc.address,"callLoc",0,"address")+'</div>'
      +'<div class="muted" style="font-size:12.5px;margin-top:3px">what3words: '+ced(c.callLoc.w3w,"callLoc",0,"w3w")+'</div>'
      +'<a class="maplink" target="_blank" rel="noopener" href="'+mapsLink(c.callLoc.address||c.callLoc.name)+'">📍 Open in Maps</a></div>'

    +'<div class="csec"><h3>Key timings</h3>'+tl+'</div>'
    +'<div class="csec"><h3>Scenes today</h3>'+scHtml+'</div>'
    +'<div class="csec"><h3>Cast called</h3>'+castHtml+'<button class="btn addbtn" onclick="addRow(\'cast\')">+ Add cast</button></div>'
    +'<div class="csec"><h3>Crew</h3>'+crewHtml+'<button class="btn addbtn" onclick="addRow(\'crew\')">+ Add crew</button></div>'
    +'<div class="csec"><h3>Extras</h3>'+exHtml+'<button class="btn addbtn" onclick="addRow(\'extras\')">+ Add extra</button></div>'
    +'<div class="csec"><h3>Stunts</h3>'+stHtml+'<button class="btn addbtn" onclick="addRow(\'stunts\')">+ Add stunt</button></div>'

    +'<div class="csec"><h3>Notes</h3><div class="csnotes" contenteditable="true" data-sec="notes" data-i="0" data-f="notes">'+(c.notes||"")+'</div></div>'

    +'<div class="csec"><h3>Emergency</h3><div>In an emergency call <b>999</b>.</div>'
      +'<div style="margin-top:4px">Nearest A&E: '+ced(c.ae.name,"ae",0,"name")+'</div>'
      +'<a class="maplink" target="_blank" rel="noopener" href="'+mapsLink(aeQ)+'">🏥 Find nearest A&E</a></div>';

  wireCall();
  fetchWx(di).then(w=>{const el=$("wxBox");if(el)el.innerHTML=wxHtml(w);}).catch(()=>{const el=$("wxBox");if(el)el.innerHTML='<span class="muted">Weather unavailable — Open-Meteo only forecasts ~16 days ahead.</span>';});
}
function setCell(sec,i,f,val){const c=CALL[CCUR];
  if(sec==="callLoc")c.callLoc[f]=val; else if(sec==="ae")c.ae[f]=val; else if(sec==="notes")c.notes=val; else c[sec][i][f]=val; saveCall();}
function addRow(sec){const c=CALL[CCUR];
  if(sec==="crew")c.crew.push({role:"Role",name:"Name",email:"",phone:""});
  else if(sec==="cast")c.cast.push({char:"CHARACTER",actor:"Actor",email:"",phone:"",callT:""});
  else if(sec==="extras")c.extras.push({name:"Name",note:""});
  else if(sec==="stunts")c.stunts.push({role:"Role",name:"Name",phone:""});
  saveCall();renderCall();}
function delRow(sec,i){CALL[CCUR][sec].splice(i,1);saveCall();renderCall();}
function wireCall(){
  $("cBody").querySelectorAll(".ced,.csnotes").forEach(el=>el.addEventListener("blur",()=>{
    const v=el.textContent; setCell(el.dataset.sec,+el.dataset.i,el.dataset.f,v);
    if(["callLoc","crew","cast","stunts","ae"].includes(el.dataset.sec)) renderCall();
  }));
}

/* ===== cross-device sync via EdgeOne KV (/state) ===== */
const API_CANDIDATES=["/api/state","/state"]; let API=API_CANDIDATES[0]; let localRev={sched:0,call:0};
function resolveAPI(){return (async()=>{for(const u of API_CANDIDATES){try{const r=await fetch(u,{cache:"no-store"});if(r.ok){API=u;return;}}catch(e){}}})();}
function pushRemote(key,data){
  return fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({key,value:data})})
    .then(r=>r.json()).then(j=>{if(j&&j.rev)localRev[key]=j.rev;}).catch(()=>{});
}
function editingNow(){const a=document.activeElement;return a&&(a.isContentEditable||a.tagName==="INPUT"||a.tagName==="TEXTAREA"||a.tagName==="SELECT");}
function applyRemote(key,obj){
  if(!obj||typeof obj.rev!=="number"||obj.rev<=localRev[key])return false;
  localRev[key]=obj.rev;
  if(key==="sched"){SCHED=obj.data; if(store)store.setItem(KEY,JSON.stringify(SCHED)); HIST=[JSON.stringify(SCHED)];HP=0;}
  else {CALL=obj.data; if(store)store.setItem(CKEY,JSON.stringify(CALL));}
  return true;
}
function pullRemote(initial){
  return fetch(API,{cache:"no-store"}).then(r=>r.json()).then(j=>{
    if(!j)return;
    if(editingNow()&&!initial)return;             // don't clobber an in-progress edit
    let changed=false;
    if(applyRemote("sched",j.sched))changed=true;
    if(applyRemote("call",j.call))changed=true;
    if(initial){ if(!j.sched)pushRemote("sched",SCHED); if(!j.call)pushRemote("call",CALL); } // seed empty store
    if(changed){const a=document.querySelector(".view.active");if(a){if(a.id==="view-schedule")renderSched();else if(a.id==="view-callsheet")renderCall();else if(a.id==="view-travel")renderTravel();}}
  }).catch(()=>{});
}

/* init */
load(); loadCall(); go("menu");
resolveAPI().then(()=>{ pullRemote(true); setInterval(()=>pullRemote(false),20000); });
